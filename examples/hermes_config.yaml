# Example: Hermes Agent configuration for CloakBrowser MCP Server
# Add this to ~/.hermes/config.yaml

mcp_servers:
  cloakbrowser:
    command: "python"
    args: ["-m", "cloakbrowser_mcp.server"]
    timeout: 120          # per-tool-call timeout in seconds
    connect_timeout: 60   # initial connection timeout

# After adding this config, restart Hermes Agent.
# Tools will be registered as mcp_cloakbrowser_cloak_*
#
# Example tool names:
#   mcp_cloakbrowser_cloak_launch
#   mcp_cloakbrowser_cloak_navigate
#   mcp_cloakbrowser_cloak_snapshot
#   mcp_cloakbrowser_cloak_click
#   mcp_cloakbrowser_cloak_type
#   mcp_cloakbrowser_cloak_screenshot
#   ...
